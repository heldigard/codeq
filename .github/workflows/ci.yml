name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # pyproject declares >=3.11; test every supported minor so a
        # 3.11/3.13-only regression cannot ship from a 3.12-green run.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y universal-ctags shellcheck ripgrep
          npm install -g @ast-grep/cli
      - name: Install package
        run: python -m pip install -e '.[test]'
      - name: Lint
        run: ruff check .
      - name: Format
        run: ruff format --check .
      - name: Typecheck
        run: mypy src
      - name: Run tests
        run: pytest
